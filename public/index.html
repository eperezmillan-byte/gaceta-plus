<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gaceta+ — Edición premium</title>
  <meta name="description" content="Gaceta+ · Cotizaciones de Nueva York en vivo y feeds editoriales de La Gaceta Mercantil." />
  <meta name="theme-color" content="#0c0c0e" />

  <!-- PWA · web app manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- PWA · iOS (Safari no usa el manifest, necesita estos tags) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gaceta+" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Favicon estándar -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230c0c0e'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='20' font-weight='600' fill='%23d4a574'%3EG%2B%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400,50;9..144,500,40;9..144,600,30;9..144,700,30;9..144,900,20&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <!-- Netlify Identity widget. SIN defer/async: necesita cargarse antes
       que app.js para procesar los tokens de invitación/recovery/confirmation
       que llegan en el #hash de la URL desde los emails.
       El widget detecta automáticamente el endpoint /.netlify/identity de
       este mismo dominio. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- Pantalla de login: tapa todo hasta que el usuario esté autenticado -->
  <div class="auth-gate" id="authGate" aria-hidden="true">
    <div class="auth-card">
      <div class="auth-brand" aria-label="Gaceta+">
        <span class="brand-mark">Gaceta</span><span class="brand-plus">+</span>
      </div>
      <p class="auth-tagline">Acceso a la edición premium</p>
      <button class="btn btn-primary auth-btn" id="authLoginBtn" type="button">
        Iniciar sesión
      </button>
      <button class="btn btn-ghost auth-btn" id="authSignupBtn" type="button">
        Crear cuenta
      </button>
      <p class="auth-hint">
        ¿Olvidaste tu contraseña? Iniciá sesión y tocá "Forgot password".
      </p>
    </div>
  </div>

  <header class="app-header">
    <div class="topbar">
      <div class="brand" aria-label="Gaceta+">
        <span class="brand-mark">Gaceta</span><span class="brand-plus">+</span>
      </div>
      <div class="actions">
        <span class="user-email" id="userEmail" aria-live="polite"></span>
        <button class="btn btn-ghost" id="logoutBtn" type="button" hidden>Cerrar sesión</button>
        <button class="btn btn-primary" id="subscribeBtn" type="button">Suscribirse</button>
      </div>
    </div>

    <section class="ticker-wrap" aria-label="Cotizaciones de Nueva York">
      <div class="ticker-label" aria-label="En vivo" title="En vivo">
        <span class="dot"></span>
      </div>
      <div class="ticker">
        <div class="ticker-track" id="tickerTrack">
          <div class="ticker-loading">Cargando cotizaciones…</div>
        </div>
      </div>
    </section>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="actualidad" role="tab" aria-selected="true">
      Actualidad<span class="tab-count" id="count-actualidad" hidden></span>
    </button>
    <button class="tab" data-tab="cnv" role="tab" aria-selected="false">
      CNV<span class="tab-count" id="count-cnv" hidden></span>
    </button>
    <button class="tab" data-tab="yt" role="tab" aria-selected="false">YT</button>
    <button class="tab" data-tab="yf" role="tab" aria-selected="false">YF</button>
    <div class="tab-meta">
      <span class="updated" id="lastUpdated">—</span>
      <button class="refresh" id="refreshBtn" type="button" title="Actualizar ahora" aria-label="Actualizar ahora">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="content">
    <section class="panel active" id="panel-actualidad" role="tabpanel" aria-labelledby="tab-actualidad">
      <div class="feed" id="feed-actualidad"></div>
    </section>
    <section class="panel" id="panel-cnv" role="tabpanel" aria-labelledby="tab-cnv">
      <div class="feed" id="feed-cnv"></div>
    </section>
    <section class="panel" id="panel-yt" role="tabpanel" aria-labelledby="tab-yt">
      <div class="feed feed-videos" id="feed-yt"></div>
    </section>
    <section class="panel" id="panel-yf" role="tabpanel" aria-labelledby="tab-yf">
      <div class="feed" id="feed-yf"></div>
    </section>
  </main>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" data-close type="button" aria-label="Cerrar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <span>Gaceta+ © <span id="year"></span> · Cotizaciones Yahoo Finance · Feeds La Gaceta Mercantil & YouTube</span>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
