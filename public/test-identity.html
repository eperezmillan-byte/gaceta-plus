<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diagnóstico Identity · Gaceta+</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #0c0c0e;
      color: #f5f1e8;
      line-height: 1.6;
    }
    h1 { color: #d4a574; }
    button {
      background: #d4a574;
      color: #0c0c0e;
      padding: 14px 24px;
      border: 0;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 8px 8px 8px 0;
    }
    button:hover { background: #e5c194; }
    .log {
      background: #141417;
      border: 1px solid #2a2a30;
      padding: 16px;
      border-radius: 6px;
      margin-top: 20px;
      font-family: monospace;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
    }
    .log .ok    { color: #6bd28e; }
    .log .err   { color: #ef6363; }
    .log .info  { color: #b8b1a3; }
    .log .warn  { color: #e5c194; }
    code {
      background: #2a2a30;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
    }
  </style>

  <!-- Widget oficial Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <h1>Diagnóstico Netlify Identity</h1>
  <p>
    Esta página es un test mínimo: <strong>solo</strong> carga el widget y prueba
    abrirlo. Si acá funciona pero en la app principal no, sé que el problema
    está en mi código. Si tampoco funciona acá, el problema está en la
    configuración del sitio en Netlify.
  </p>

  <button onclick="testOpenLogin()">1 · Probar abrir Login</button>
  <button onclick="testOpenSignup()">2 · Probar abrir Signup</button>
  <button onclick="testCheckUser()">3 · Ver usuario actual</button>
  <button onclick="clearLog()">Limpiar log</button>

  <div class="log" id="log"></div>

  <script>
    const log = document.getElementById('log');

    function write(msg, cls = 'info') {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.innerHTML = `<span class="info">[${time}]</span> <span class="${cls}">${msg}</span>`;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
      console.log(`[${cls}] ${msg.replace(/<[^>]+>/g, '')}`);
    }

    function clearLog() { log.innerHTML = ''; }

    // Verificación al cargar
    window.addEventListener('load', () => {
      write('Página cargada.');

      if (typeof window.netlifyIdentity === 'undefined') {
        write('✗ <code>window.netlifyIdentity</code> NO está disponible. El widget no cargó.', 'err');
        write('Posibles causas: adblocker, sin internet, o el script identity.netlify.com no se descargó.', 'warn');
        return;
      }

      write('✓ <code>window.netlifyIdentity</code> está disponible.', 'ok');
      write('Métodos del widget: ' + Object.keys(window.netlifyIdentity).join(', '), 'info');

      window.netlifyIdentity.on('init', user => {
        write('Evento <code>init</code> disparado. Usuario: ' + (user ? user.email : 'ninguno'), 'ok');
      });

      window.netlifyIdentity.on('login', user => {
        write('✓ Login exitoso: ' + user.email, 'ok');
      });

      window.netlifyIdentity.on('open', () => {
        write('Modal abierto.', 'ok');
      });

      window.netlifyIdentity.on('close', () => {
        write('Modal cerrado.', 'info');
      });

      window.netlifyIdentity.on('error', err => {
        write('✗ Error del widget: ' + err.message, 'err');
      });

      // Algunos navegadores requieren llamada explícita a init()
      try {
        window.netlifyIdentity.init();
        write('Llamado a <code>init()</code> exitoso.', 'ok');
      } catch (e) {
        write('Error al llamar init(): ' + e.message, 'err');
      }
    });

    function testOpenLogin() {
      write('Intentando abrir modal de login...', 'info');
      if (!window.netlifyIdentity) {
        write('✗ Widget no disponible.', 'err');
        return;
      }
      try {
        window.netlifyIdentity.open('login');
        write('Llamada a <code>open("login")</code> ejecutada sin error.', 'ok');
      } catch (e) {
        write('✗ Excepción al abrir: ' + e.message, 'err');
      }
    }

    function testOpenSignup() {
      write('Intentando abrir modal de signup...', 'info');
      if (!window.netlifyIdentity) {
        write('✗ Widget no disponible.', 'err');
        return;
      }
      try {
        window.netlifyIdentity.open('signup');
        write('Llamada a <code>open("signup")</code> ejecutada sin error.', 'ok');
      } catch (e) {
        write('✗ Excepción al abrir: ' + e.message, 'err');
      }
    }

    function testCheckUser() {
      if (!window.netlifyIdentity) {
        write('✗ Widget no disponible.', 'err');
        return;
      }
      const user = window.netlifyIdentity.currentUser();
      write('currentUser() devuelve: ' + JSON.stringify(user, null, 2), user ? 'ok' : 'info');
    }
  </script>
</body>
</html>
